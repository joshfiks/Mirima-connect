<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mirima Connect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Intro Video -->

<div id="introScreen">

<video id="introVideo" preload="auto">

<source src="videos/intro.mp4" type="video/mp4">

</video>

<div id="welcomeText"></div>

</div>

<!-- Background -->

<div class="background"></div>

<div class="overlay"></div>

<div class="mist mist1"></div>
<div class="mist mist2"></div>

<div class="leaves"></div>

<div class="fireflies"></div>

  <div class="birds birds1">
        <img src="birds/birds1.gif" alt="">
    </div>

    <div class="birds birds2">
        <img src="birds/birds2.gif" alt="">
    </div>

    <div class="birds birds3">
        <img src="birds/birds3.gif" alt="">
    </div>

    <div class="birds birds4">
        <img src="birds/birds4.gif" alt="">
    </div>
 
  <div class="lantern left">
    <img src="images/lantern.jpg" alt="Lantern">
</div>

<div class="lantern right">
    <img src="images/lantern.jpg" alt="Lantern">
</div>

<!-- Hero -->

 <section class="hero">
   
    <div class="hero-content">

        <!-- Logo -->
<div class="hero-content">

<div class="logo">
    <img src="images/logo.png">
</div>

<h1>Mirima Connect</h1>

<h2>Luxury Guest Experience</h2>

<p>

Relax.<br>

Order Food.<br>

Request Housekeeping.<br>

Explore Nature.

</p>

<button id="enter">

ENTER YOUR STAY

</button>

</div>

</section>

  <div id="welcomeScreen">

    <div id="typingText"></div>

</div>
<!-- Guest Portal -->

<section class="portal">

  <!-- Decorations -->


<img src="decorations/roots-bottom.webp" class="roots-bottom" alt="">


<div class="wood-panel">

<h3>Guest Services</h3>

<div class="cards">

<div class="card">

<img src="icons/food.png">

<span>Food & Drinks</span>

</div>

<div class="card">

<img src="icons/housekeeping.png">

<span>Housekeeping</span>

</div>

<div class="card">

<img src="icons/reception.png">

<span>Reception</span>

</div>

<div class="card">

<img src="icons/explore.png">

<span>Explore</span>

</div>

<div class="card">

<img src="icons/feedback.png">

<span>Feedback</span>

</div>

<div class="card">

<img src="icons/bill.png">

<span>My Bill</span>

</div>

</div>

</div>

</section>

 <!-- Ambient Audio -->

<audio id="dayForest" loop>
    <source src="audio/day-forest.mp3" type="audio/mpeg">
</audio>

<audio id="dayBirds" loop>
    <source src="audio/day-birds.mp3" type="audio/mpeg">
</audio>

<audio id="nightForest" loop>
    <source src="audio/night-forest.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>

</html>
